<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no">
<title>Холбоо барих — Joy Billiard & Pub</title>

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<!-- Open Graph / Social Share -->
<meta property="og:type" content="website">
<meta property="og:title" content="Холбоо барих — Joy Billiard & Pub">
<meta property="og:description" content="Бильярд, караоке, VIP өрөө — Joy Billiard & Pub">
<meta property="og:image" content="/Joybilliardlogo.png">
<meta property="og:url" content="https://joybillard.mn">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Холбоо барих — Joy Billiard & Pub">
<meta name="twitter:description" content="Бильярд, караоке, VIP өрөө — Joy Billiard & Pub">
<meta name="twitter:image" content="/Joybilliardlogo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/transitions.css">
<style>
:root{
  --accent:#D4A843;--accent-h:#F0D078;
  --bg:#000;--surface:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.08);--border-h:rgba(255,255,255,.16);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;display:flex;justify-content:center;
  font-family:Rubik,Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:#fff;line-height:1.4;
  -webkit-font-smoothing:antialiased;
  padding:52px 0 60px;
}
@media(min-width:1024px){body{padding:0;align-items:center}}
.page{width:100%;max-width:420px;padding:0 16px}

/* ── TOP BAR ── */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:200;height:52px;
  background:rgba(0,0,0,.88);backdrop-filter:blur(20px);
  border-bottom:1px solid transparent;transition:border-color .25s;
  display:flex;align-items:center;justify-content:center;
}
.top-bar.scrolled{border-color:var(--border)}
.top-bar-inner{
  width:100%;max-width:420px;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.top-logo{font-size:.88rem;font-weight:800;color:#fff;text-decoration:none;display:flex;align-items:center;gap:6px}
.top-logo img{height:32px;width:auto;border-radius:4px}
.top-logo span{color:var(--accent)}
.top-logo-sub{font-size:.42rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3)}
@media(min-width:1024px){
  .top-bar{position:relative;border:none;background:transparent;backdrop-filter:none;height:auto;padding:24px 0 12px}
}

/* ── SECTION LABEL ── */
.section-label{margin:24px 0 10px;font-weight:800;font-size:.65rem;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.4)}

/* ── CONTACT CARDS ── */
.contact-list{display:flex;flex-direction:column;gap:8px}
.contact-row{
  display:flex;align-items:center;gap:12px;padding:12px;
  background:var(--surface);border:1px solid var(--border);border-radius:4px;
  text-decoration:none;color:#fff;overflow:hidden;
  transition:background .18s,transform .12s,border-color .18s;
}
.contact-row:active{transform:scale(.985)}
.contact-row:hover{background:rgba(255,255,255,.08);border-color:var(--border-h)}
.contact-icon{width:36px;height:36px;border-radius:4px;background:rgba(212,168,67,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.contact-icon svg{width:17px;height:17px;color:var(--accent)}
.contact-label{font-size:.5rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:1px}
.contact-info{min-width:0;flex:1;overflow:hidden}
.contact-value{font-weight:700;font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}

/* ── FEEDBACK FORM ── */
.feedback-form{display:flex;flex-direction:column;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:.55rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.4)}
.form-label .req{color:var(--accent)}
.form-input,.form-select,.form-textarea{
  width:100%;padding:11px 14px;background:var(--surface);
  border:1px solid var(--border);border-radius:4px;
  color:#fff;font-family:inherit;font-size:.82rem;font-weight:500;
  outline:none;transition:border-color .2s,background .2s;
  -webkit-appearance:none;appearance:none;
}
.form-input::placeholder,.form-textarea::placeholder{color:rgba(255,255,255,.25)}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);background:rgba(255,255,255,.08)}
.form-textarea{min-height:100px;resize:vertical;line-height:1.5}
.branch-selector{display:flex;gap:8px}
.branch-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 12px;background:var(--surface);
  border:1px solid var(--border);border-radius:4px;
  color:rgba(255,255,255,.5);font-family:inherit;
  font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;
}
.branch-btn:hover{border-color:var(--border-h);background:rgba(255,255,255,.08)}
.branch-btn.selected{border-color:var(--accent);background:rgba(212,168,67,.1);color:var(--accent)}
.branch-btn svg{width:16px;height:16px;flex-shrink:0}
.submit-btn{
  width:100%;padding:12px 16px;
  background:linear-gradient(135deg,var(--accent),var(--accent-h));
  border:none;border-radius:4px;color:#000;font-family:inherit;
  font-size:.84rem;font-weight:800;cursor:pointer;transition:all .2s;
}
.submit-btn:active{transform:scale(.975)}
.submit-btn:hover{box-shadow:0 6px 20px rgba(212,168,67,.25)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* Success */
.success-msg{display:none;text-align:center;padding:40px 20px}
.success-msg.show{display:block}
.success-icon{width:48px;height:48px;margin:0 auto 14px;border-radius:50%;background:rgba(42,140,74,.15);display:flex;align-items:center;justify-content:center}
.success-icon svg{width:24px;height:24px;color:#2A8C4A}
.success-title{font-size:1rem;font-weight:800;margin-bottom:4px}
.success-sub{font-size:.78rem;color:rgba(255,255,255,.5)}

/* ── FOOTER ── */
.footer{margin-top:28px;padding:16px 0 6px;border-top:1px solid var(--border);text-align:center;font-size:.55rem;color:rgba(255,255,255,.2)}

/* ── BOTTOM BAR ── */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:rgba(6,6,6,.94);border-top:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(20px);padding-bottom:env(safe-area-inset-bottom);
}
.bottom-bar-inner{
  display:flex;justify-content:space-around;align-items:stretch;
  height:52px;max-width:420px;margin:0 auto;
}
.bar-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  text-decoration:none;color:rgba(255,255,255,.3);
  font-size:.46rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:0 10px;transition:color .15s;position:relative;flex:1;
}
.bar-item::before{
  content:'';position:absolute;top:0;left:25%;right:25%;height:2px;border-radius:0 0 2px 2px;
  background:var(--accent);opacity:0;transition:opacity .2s,transform .2s;transform:scaleX(.4);
}
.bar-item.bar-active{color:var(--accent)}
.bar-item.bar-active::before{opacity:1;transform:scaleX(1)}
.bar-item svg{width:18px;height:18px;flex-shrink:0}
@media(min-width:1024px){
  body{padding:0 0 0}
  .top-bar{position:fixed;background:rgba(0,0,0,.92);backdrop-filter:blur(24px);height:60px;border-bottom:1px solid var(--border)}
  .top-bar-inner{max-width:1200px;padding:0 40px}
  .top-logo{font-size:1rem}
  .top-logo img{height:38px}
  .page{max-width:1200px;padding:0 40px;margin:0 auto}
  .section-label{font-size:.72rem;margin:32px 0 14px}
  .contact-list{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .contact-row{padding:16px;border-radius:8px}
  .contact-row:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
  .contact-icon{width:42px;height:42px;border-radius:6px}
  .contact-value{font-size:.88rem}
  .feedback-form{max-width:600px}
  .form-input,.form-textarea{font-size:.88rem;padding:13px 16px}
  .submit-btn{font-size:.9rem;padding:14px 18px;max-width:300px}
  .branch-btn{padding:13px 16px;font-size:.84rem}
  .footer{margin-top:40px;padding:20px 0 10px;font-size:.6rem}
  .bottom-bar{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(6,6,6,.94);border-top:1px solid rgba(255,255,255,.06);backdrop-filter:blur(20px)}
  .bottom-bar-inner{max-width:1200px}
  .bar-item{font-size:.52rem;flex-direction:row;gap:6px}
}
@media(min-width:1440px){
  .page{max-width:1400px;padding:0 60px}
  .top-bar-inner{max-width:1400px;padding:0 60px}
  .bottom-bar-inner{max-width:1400px}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar" id="topBar">
  <div class="top-bar-inner">
    <a href="/" class="top-logo"><img src="/Joybilliardlogo.png" alt="Joy Billiard & Pub"> JOY <span>BILLIARD</span></a>
  </div>
</div>

<div class="page">

  <!-- CONTACT INFO -->
  <div class="section-label">Холбоо барих</div>
  <div class="contact-list">
    <a id="cPhone" href="tel:+97699112233" class="contact-row">
      <div class="contact-icon"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg></div>
      <div class="contact-info"><div class="contact-label">Утас</div><div class="contact-value" id="cPhoneVal">+976 9911 2233</div></div>
    </a>
    <a id="cEmail" href="#" class="contact-row" style="display:none">
      <div class="contact-icon"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg></div>
      <div class="contact-info"><div class="contact-label">Имэйл</div><div class="contact-value" id="cEmailVal"></div></div>
    </a>
    <a id="cMap" href="https://maps.app.goo.gl/9W9cpVcTaiwWHRCX8" target="_blank" class="contact-row">
      <div class="contact-icon"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div>
      <div class="contact-info"><div class="contact-label">Байршил 1</div><div class="contact-value" id="cLocVal">Joy billiards</div></div>
    </a>
    <a id="cMap2" href="https://maps.app.goo.gl/QuybXy3ZvK2fFF5x9" target="_blank" class="contact-row">
      <div class="contact-icon"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div>
      <div class="contact-info"><div class="contact-label">Байршил 2</div><div class="contact-value" id="cLoc2Val">Himchan Center</div></div>
    </a>
    <div class="contact-row">
      <div class="contact-icon"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
      <div class="contact-info"><div class="contact-label">Цагийн хуваарь</div><div class="contact-value" id="cHoursVal">Өдөр бүр 11:30 – 02:00</div></div>
    </div>
  </div>

  <!-- FEEDBACK FORM -->
  <div class="section-label" style="margin-top:28px">Санал хүсэлт</div>
  <form class="feedback-form" id="feedbackForm" onsubmit="submitFeedback(event)">
    <div class="form-group">
      <label class="form-label">Салбар сонгоно</label>
      <div class="branch-selector">
        <button type="button" class="branch-btn selected" data-branch="Салбар 1" onclick="selectBranch(this)">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Салбар 1
        </button>
        <button type="button" class="branch-btn" data-branch="Салбар 2" onclick="selectBranch(this)">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Салбар 2
        </button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Нэр <span class="req">*</span></label>
      <input class="form-input" type="text" id="fName" placeholder="Таны нэр" required>
    </div>
    <div class="form-group">
      <label class="form-label">Таны утасны дугаар</label>
      <input class="form-input" type="tel" id="fPhone" placeholder="Утасны дугаараа оруулаарай">
    </div>
    <div class="form-group">
      <label class="form-label">Санал хүсэлт <span class="req">*</span></label>
      <textarea class="form-textarea" id="fMessage" placeholder="Санал хүсэлтээ бичнэ үү..." required></textarea>
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">Илгээх</button>
  </form>

  <!-- SUCCESS -->
  <div class="success-msg" id="successMsg">
    <div class="success-icon"><svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div>
    <div class="success-title">Амжилттай илгээгдлээ</div>
    <div class="success-sub">Таны санал хүсэлтийг хүлээн авлаа. Баярлалаа!</div>
  </div>

  <div class="footer">&copy; 2026 Joy Billiard & Pub</div>
</div>

<!-- BOTTOM BAR -->
<nav id="bottomBar" class="bottom-bar">
  <div class="bottom-bar-inner">
    <a class="bar-item" href="/">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      <span>Нүүр</span>
    </a>
    <a class="bar-item" href="/karaoke.html">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4M12 4a3 3 0 013 3v5a3 3 0 01-6 0V7a3 3 0 013-3z"/></svg>
      <span>Karaoke</span>
    </a>
    <a class="bar-item" href="/jobs.html">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      <span>Ажил</span>
    </a>
    <a class="bar-item bar-active" href="/contact.html">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
      <span>Холбоо</span>
    </a>
  </div>
</nav>

<script>
window.addEventListener('scroll',function(){document.getElementById('topBar').classList.toggle('scrolled',window.scrollY>10)},{passive:true});

var selectedBranch='Салбар 1';
function selectBranch(btn){
  document.querySelectorAll('.branch-btn').forEach(function(b){b.classList.remove('selected')});
  btn.classList.add('selected');
  selectedBranch=btn.dataset.branch;
}

function submitFeedback(e){
  e.preventDefault();
  var btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='Илгээж байна...';
  fetch('/api/contact',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      name:document.getElementById('fName').value.trim(),
      phone:document.getElementById('fPhone').value.trim(),
      branch:selectedBranch,
      message:document.getElementById('fMessage').value.trim()
    })
  }).then(function(r){
    if(!r.ok)throw new Error('Failed');
    document.getElementById('feedbackForm').style.display='none';
    document.getElementById('successMsg').classList.add('show');
  }).catch(function(){
    btn.disabled=false;btn.textContent='Илгээх';
    alert('Алдаа гарлаа. Дахин оролдоно уу.');
  });
}

fetch('/api/settings').then(function(r){return r.json()}).then(function(s){
  if(s.phone){var c=s.phone.replace(/\s/g,'');document.getElementById('cPhone').href='tel:'+c;document.getElementById('cPhoneVal').textContent=s.phone}
  if(s.email){document.getElementById('cEmail').href='mailto:'+s.email;document.getElementById('cEmailVal').textContent=s.email;document.getElementById('cEmail').style.display='flex'}
  if(s.location)document.getElementById('cLocVal').textContent=s.location;
  if(s.locationUrl)document.getElementById('cMap').href=s.locationUrl;
  if(s.location2)document.getElementById('cLoc2Val').textContent=s.location2;
  if(s.location2Url)document.getElementById('cMap2').href=s.location2Url;
  if(s.hours)document.getElementById('cHoursVal').textContent=s.hours;
}).catch(function(){});
</script>
<script src="/transitions.js"></script>
</body>
</html>
