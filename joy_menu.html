<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joy Billiard & Pub — Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#141416;
  --surface:#1a1a1e;
  --surface2:#222226;
  --surface3:#2a2a2e;
  --brand:#FFD300;
  --brand-dim:#b89800;
  --brand-glow:rgba(255,211,0,.15);
  --cyan:#00e5ff;
  --cyan-dim:#007a8a;
  --white:#eeeee8;
  --muted:#6a6a72;
  --muted-light:#8a8a94;
  --danger:#ff2d55;
  --success:#00e676;
  --font-display:'Orbitron',sans-serif;
  --font-body:'Rajdhani',sans-serif;
  --font-mono:'Share Tech Mono',monospace;
  --radius:4px;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--white);
  font-family:var(--font-body);
  font-weight:400;
  font-size:16px;
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;
}

/* Scanline overlay */
body::before{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.03) 2px,
    rgba(0,0,0,.03) 4px
  );
}

/* Subtle grid bg */
body::after{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,211,0,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,211,0,.02) 1px,transparent 1px);
  background-size:60px 60px;
}

/* ─── HEADER ─── */
.hero{
  position:relative;
  padding:2.5rem 1.5rem 2rem;
  text-align:center;
  background:linear-gradient(180deg,#1a1a20 0%,var(--bg) 100%);
  border-bottom:1px solid rgba(255,211,0,.12);
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:300px;height:2px;
  background:linear-gradient(90deg,transparent,var(--brand),transparent);
}
.hero::after{
  content:'';position:absolute;top:0;left:0;right:0;height:100%;
  background:radial-gradient(ellipse at 50% 0%,rgba(255,211,0,.06) 0%,transparent 65%);
  pointer-events:none;
}

.hero-badge{
  display:inline-flex;align-items:center;gap:.5rem;
  font-family:var(--font-mono);
  letter-spacing:.2em;
  font-size:.65rem;
  color:var(--cyan);
  text-transform:uppercase;
  border:1px solid rgba(0,229,255,.25);
  padding:.3rem 1rem;
  border-radius:var(--radius);
  margin-bottom:1rem;
  position:relative;
  z-index:1;
}
.hero-badge::before{
  content:'//';color:var(--muted);margin-right:.2rem;
}

.hero h1{
  font-family:var(--font-display);
  font-size:clamp(1.5rem,4.5vw,2.8rem);
  font-weight:800;
  color:var(--brand);
  letter-spacing:.06em;
  line-height:1.15;
  text-transform:uppercase;
  text-shadow:0 0 30px rgba(255,211,0,.2);
  position:relative;z-index:1;
}
.hero h1 span{
  display:block;
  font-size:.4em;
  font-family:var(--font-mono);
  color:var(--muted);
  letter-spacing:.3em;
  margin-top:.5rem;
  font-weight:400;
  text-shadow:none;
}

.hero-stats{
  display:flex;justify-content:center;gap:2.5rem;margin-top:1.5rem;flex-wrap:wrap;
  position:relative;z-index:1;
}
.hero-stat{text-align:center}
.hero-stat .num{
  font-family:var(--font-display);font-size:1.3rem;font-weight:700;
  color:var(--brand);letter-spacing:.05em;
}
.hero-stat .label{
  font-size:.65rem;color:var(--muted);text-transform:uppercase;
  letter-spacing:.15em;font-family:var(--font-mono);
}

/* ─── LANGUAGE TOGGLE ─── */
.lang-toggle{
  position:absolute;top:1rem;right:1.5rem;z-index:2;
  display:flex;gap:0;
  border:1px solid rgba(255,211,0,.2);
  border-radius:var(--radius);overflow:hidden;
}
.lang-btn{
  font-family:var(--font-mono);
  font-size:.65rem;font-weight:600;
  color:var(--muted);
  background:transparent;
  border:none;
  padding:.35rem .7rem;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:.1em;
  transition:all .2s;
}
.lang-btn:hover{color:var(--white)}
.lang-btn.active{
  background:rgba(255,211,0,.12);
  color:var(--brand);
}

/* ─── NAV ─── */
.nav-wrap{
  position:sticky;top:0;z-index:100;
  background:rgba(20,20,22,.95);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,211,0,.08);
}
.nav{
  display:flex;gap:.3rem;padding:.5rem 1rem;
  overflow-x:auto;scrollbar-width:none;
  max-width:1200px;margin:0 auto;
}
.nav::-webkit-scrollbar{display:none}
.nav-btn{
  flex-shrink:0;
  font-family:var(--font-body);
  font-size:.7rem;font-weight:600;
  color:var(--muted);
  background:transparent;
  border:1px solid transparent;
  padding:.4rem .75rem;
  border-radius:var(--radius);
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
  text-transform:uppercase;
  letter-spacing:.06em;
}
.nav-btn:hover{color:var(--white);border-color:rgba(255,211,0,.15)}
.nav-btn.active{
  color:var(--brand);
  border-color:var(--brand-dim);
  background:rgba(255,211,0,.06);
  box-shadow:0 0 8px rgba(255,211,0,.08);
}

/* ─── SEARCH ─── */
.search-bar{
  max-width:1200px;margin:1.2rem auto .5rem;padding:0 1.5rem;
}
.search-wrap{position:relative}
.search-input{
  width:100%;
  background:var(--surface);
  border:1px solid rgba(255,211,0,.1);
  color:var(--white);
  font-family:var(--font-body);
  font-size:.9rem;font-weight:500;
  padding:.7rem 1rem .7rem 2.6rem;
  border-radius:var(--radius);
  outline:none;
  transition:all .25s;
}
.search-input:focus{
  border-color:var(--brand);
  box-shadow:0 0 12px rgba(255,211,0,.08),inset 0 0 8px rgba(255,211,0,.03);
}
.search-input::placeholder{color:var(--muted);font-weight:400}
.search-icon{
  position:absolute;left:.85rem;top:50%;transform:translateY(-50%);
  width:16px;height:16px;opacity:.4;pointer-events:none;
}
.search-count{
  position:absolute;right:.8rem;top:50%;transform:translateY(-50%);
  font-family:var(--font-mono);font-size:.65rem;color:var(--muted);
  display:none;
}
.search-count.visible{display:block}

/* ─── FILTER CHIPS ─── */
.filter-bar{
  max-width:1200px;margin:.5rem auto 0;padding:0 1.5rem;
  display:flex;gap:.5rem;flex-wrap:wrap;
}
.filter-chip{
  font-family:var(--font-body);
  font-size:.68rem;font-weight:600;
  color:var(--muted);
  background:var(--surface);
  border:1px solid rgba(255,255,255,.06);
  padding:.3rem .7rem;
  border-radius:var(--radius);
  cursor:pointer;
  transition:all .2s;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.filter-chip:hover{color:var(--white);border-color:rgba(255,211,0,.2)}
.filter-chip.active{
  color:var(--brand);
  border-color:var(--brand-dim);
  background:rgba(255,211,0,.08);
}

/* ─── MENU CONTAINER ─── */
.menu-container{max-width:1200px;margin:0 auto;padding:1rem 1.5rem 4rem}

/* ─── SECTIONS ─── */
.section{margin-bottom:2.5rem;animation:fadeUp .4s ease both}
.section-header{
  display:flex;align-items:center;gap:.75rem;
  margin-bottom:1rem;padding-bottom:.5rem;
  border-bottom:1px solid rgba(255,211,0,.08);
  position:relative;
}
.section-header::before{
  content:'';position:absolute;bottom:-1px;left:0;
  width:40px;height:1px;background:var(--brand);
}
.section-title{
  font-family:var(--font-display);
  font-size:.85rem;font-weight:700;
  color:var(--brand);
  text-transform:uppercase;
  letter-spacing:.08em;
}
.section-count{
  margin-left:auto;
  font-size:.6rem;
  color:var(--muted);
  font-family:var(--font-mono);
  letter-spacing:.1em;
  background:var(--surface);
  padding:.2rem .5rem;
  border-radius:var(--radius);
  border:1px solid rgba(255,255,255,.04);
}

/* ─── ITEMS GRID ─── */
.items-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:.5rem;
}

.menu-item{
  display:grid;
  grid-template-columns:1fr auto;
  gap:.2rem .75rem;
  padding:.75rem .9rem;
  background:var(--surface);
  border:1px solid rgba(255,255,255,.04);
  border-radius:var(--radius);
  transition:all .2s;
  cursor:default;
  align-items:start;
  position:relative;
}
.menu-item:hover{
  background:var(--surface2);
  border-color:rgba(255,211,0,.15);
  box-shadow:0 0 12px rgba(255,211,0,.04);
}
.menu-item::before{
  content:'';position:absolute;top:0;left:0;bottom:0;
  width:2px;background:transparent;border-radius:1px;
  transition:background .2s;
}
.menu-item:hover::before{
  background:var(--brand);
}

.item-name{
  font-weight:600;font-size:.85rem;
  color:var(--white);
  line-height:1.35;
}
.item-name-mn{
  display:block;
  font-size:.72rem;
  color:var(--muted);
  font-weight:400;
  margin-top:.1rem;
}
.item-price{
  font-family:var(--font-mono);
  font-size:.88rem;
  color:var(--brand);
  letter-spacing:.02em;
  text-align:right;
  white-space:nowrap;
}
.item-meta{
  grid-column:1/-1;
  display:flex;gap:.6rem;align-items:center;
  margin-top:.15rem;
}
.item-kcal{
  font-size:.62rem;
  color:var(--cyan);
  background:rgba(0,229,255,.06);
  padding:.15rem .45rem;
  border-radius:var(--radius);
  font-weight:600;
  font-family:var(--font-mono);
  border:1px solid rgba(0,229,255,.1);
}
.item-note{
  font-size:.68rem;
  color:var(--muted);
  font-style:normal;
  line-height:1.4;
}

/* ─── PRICE VARIANTS (Pizza M/L) ─── */
.price-sizes{
  display:flex;gap:.35rem;
  text-align:right;
  flex-direction:column;
}
.price-size{
  font-family:var(--font-mono);
  font-size:.8rem;
  color:var(--brand);
  letter-spacing:.02em;
}
.price-size .sz{
  font-family:var(--font-body);
  font-size:.55rem;
  color:var(--muted);
  font-weight:700;
  margin-right:.25rem;
  text-transform:uppercase;
  background:rgba(255,255,255,.04);
  padding:.1rem .25rem;
  border-radius:2px;
}

/* ─── SPIRITS (50ml / Bottle) ─── */
.price-spirit{
  display:flex;gap:.35rem;text-align:right;
  flex-direction:column;
}
.price-spirit-line{
  font-family:var(--font-mono);
  font-size:.78rem;
  color:var(--brand);
  letter-spacing:.02em;
}
.price-spirit-line .vol{
  font-family:var(--font-body);
  font-size:.52rem;
  color:var(--muted);
  font-weight:700;
  margin-right:.2rem;
  background:rgba(255,255,255,.04);
  padding:.1rem .25rem;
  border-radius:2px;
}

/* ─── SET / PARTY CARDS ─── */
.set-card{
  padding:1rem 1.1rem;
  background:linear-gradient(135deg,var(--surface) 0%,rgba(255,211,0,.03) 100%);
  border:1px solid rgba(255,211,0,.1);
  border-radius:var(--radius);
  margin-bottom:.5rem;
  transition:all .25s;
  position:relative;
  overflow:hidden;
}
.set-card::before{
  content:'';position:absolute;top:0;right:0;
  width:60px;height:60px;
  background:radial-gradient(circle at top right,rgba(255,211,0,.06) 0%,transparent 70%);
  pointer-events:none;
}
.set-card:hover{
  border-color:rgba(255,211,0,.3);
  box-shadow:0 0 20px rgba(255,211,0,.05);
}
.set-card-head{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:.4rem;gap:1rem;
}
.set-card-name{
  font-family:var(--font-display);
  font-size:.8rem;font-weight:700;
  color:var(--white);
  text-transform:uppercase;
  letter-spacing:.04em;
}
.set-card-price{
  font-family:var(--font-mono);
  font-size:1.1rem;
  color:var(--brand);
  letter-spacing:.02em;
  white-space:nowrap;
  text-shadow:0 0 12px rgba(255,211,0,.2);
}
.set-card-savings{
  font-family:var(--font-mono);
  font-size:.58rem;
  color:var(--success);
  background:rgba(0,230,118,.06);
  padding:.15rem .4rem;
  border-radius:var(--radius);
  border:1px solid rgba(0,230,118,.12);
  margin-left:.4rem;
}
.set-card-note{
  font-size:.73rem;
  color:var(--muted-light);
  line-height:1.55;
}
.set-card-note strong{color:var(--white);font-weight:600}
.set-card-includes{
  display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.5rem;
}
.set-tag{
  font-family:var(--font-body);
  font-size:.6rem;font-weight:600;
  color:var(--muted-light);
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  padding:.15rem .4rem;
  border-radius:var(--radius);
  text-transform:uppercase;
  letter-spacing:.02em;
}

/* ─── UTILITY ─── */
.hidden{display:none!important}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* ─── BACK TO TOP ─── */
.back-top{
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:90;
  width:36px;height:36px;
  background:var(--surface2);
  border:1px solid rgba(255,211,0,.15);
  border-radius:var(--radius);
  color:var(--brand);
  font-size:1rem;
  cursor:pointer;
  display:none;align-items:center;justify-content:center;
  transition:all .2s;
  backdrop-filter:blur(8px);
}
.back-top:hover{
  background:rgba(255,211,0,.1);
  border-color:var(--brand);
  box-shadow:0 0 12px rgba(255,211,0,.1);
}
.back-top.visible{display:flex}

/* ─── FOOTER ─── */
.footer{
  text-align:center;padding:2rem 1.5rem;
  border-top:1px solid rgba(255,211,0,.06);
  font-size:.68rem;
  font-family:var(--font-mono);
  color:var(--muted);
  letter-spacing:.04em;
}
.footer a{color:var(--brand-dim);text-decoration:none}
.footer a:hover{color:var(--brand)}
.footer-line{
  width:40px;height:1px;margin:0 auto 1rem;
  background:linear-gradient(90deg,transparent,var(--brand-dim),transparent);
}

/* ─── RESPONSIVE ─── */
@media(max-width:600px){
  .items-grid{grid-template-columns:1fr}
  .hero{padding:2rem 1rem 1.5rem}
  .hero h1{font-size:clamp(1.2rem,6vw,2rem)}
  .hero-stats{gap:1.5rem}
  .menu-container{padding:.75rem 1rem 3rem}
  .search-bar,.filter-bar{padding:0 1rem}
  .set-card-head{flex-direction:column;align-items:flex-start;gap:.3rem}
  .nav{padding:.4rem .75rem}
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--brand-dim)}

/* ─── SELECTION ─── */
::selection{background:rgba(255,211,0,.2);color:var(--white)}
</style>
</head>
<body>

<div class="hero">
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('mn')">MN</button>
  </div>
  <div class="hero-badge">Est. Ulaanbaatar</div>
  <h1>Joy Billiard & Pub<span>Food & Drink Menu</span></h1>
  <div class="hero-stats">
    <div class="hero-stat"><div class="num" id="stat-items">0</div><div class="label">Items</div></div>
    <div class="hero-stat"><div class="num" id="stat-categories">0</div><div class="label">Categories</div></div>
    <div class="hero-stat"><div class="num" id="stat-range">0</div><div class="label">Price Range</div></div>
  </div>
</div>

<div class="nav-wrap">
  <div class="nav" id="nav"></div>
</div>

<div class="search-bar">
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input class="search-input" id="search" type="text" placeholder="Search menu...">
    <span class="search-count" id="searchCount"></span>
  </div>
</div>

<div class="filter-bar" id="filters">
  <button class="filter-chip active" data-filter="all">All</button>
  <button class="filter-chip" data-filter="food">Food</button>
  <button class="filter-chip" data-filter="drink">Drinks</button>
  <button class="filter-chip" data-filter="spirits">Spirits</button>
  <button class="filter-chip" data-filter="sets">Sets</button>
</div>

<div class="menu-container" id="menu"></div>

<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8593;</button>

<div class="footer">
  <div class="footer-line"></div>
  Joy Billiard & Pub &mdash; Prices in MNT
</div>

<script>
let MENU_DATA = null;
let currentLang = 'en';
let currentFilter = 'all';

const setTypes = new Set(['party_set','spirit_sets']);
const spiritTypes = new Set(['tequila','ice_cold','cognac','gin','vodka','whisky']);
const foodCats = new Set(['appetizer_salad','soup','main_course','share_food','snack','burger','bowl_tsuivan','pizza','skewers','dessert']);
const drinkCats = new Set(['soft_drink','hot_drink','draft_beer','beer_bottle','cocktail','wine']);
const spiritCats = new Set(['tequila','ice_cold','cognac','gin','vodka','whisky']);

const fmt = n => {
  if (!n) return '\u2014';
  if (n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'') + 'M\u20AE';
  if (n >= 1000) return (n/1000).toFixed(n%1000===0?0:1).replace(/\.0$/,'') + 'K\u20AE';
  return n.toLocaleString('en-US') + '\u20AE';
};

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.trim().toLowerCase() === lang)
  );
  render();
}

function getItemName(item) {
  if (currentLang === 'mn' && item.name_mn) return { primary: item.name_mn, secondary: item.name_en };
  if (currentLang === 'en' && item.name_mn) return { primary: item.name_en, secondary: item.name_mn };
  return { primary: item.name_en || item.name_mn, secondary: null };
}

function getCatName(cat) {
  return currentLang === 'mn' ? (cat.name_mn || cat.name_en) : cat.name_en;
}

function getCatFilter(catId) {
  if (setTypes.has(catId)) return 'sets';
  if (spiritCats.has(catId)) return 'spirits';
  if (drinkCats.has(catId)) return 'drink';
  return 'food';
}

function buildNav() {
  const nav = document.getElementById('nav');
  const cats = MENU_DATA.categories.filter(c =>
    currentFilter === 'all' || getCatFilter(c.id) === currentFilter
  );
  nav.innerHTML = cats.map(c =>
    `<button class="nav-btn" data-id="${c.id}" onclick="scrollTo_('${c.id}')">${getCatName(c)}</button>`
  ).join('');
}

function scrollTo_(id) {
  const el = document.getElementById('sec-' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderItemPrice(item, catId) {
  if (item.price_m !== undefined) {
    return `<div class="price-sizes">
      <div class="price-size"><span class="sz">M</span>${fmt(item.price_m)}</div>
      <div class="price-size"><span class="sz">L</span>${fmt(item.price_l)}</div>
    </div>`;
  }
  if (spiritTypes.has(catId) && (item.price_50ml || item.price_bottle)) {
    let lines = '';
    if (item.price_50ml) lines += `<div class="price-spirit-line"><span class="vol">50ml</span>${fmt(item.price_50ml)}</div>`;
    if (item.price_bottle) lines += `<div class="price-spirit-line"><span class="vol">Btl</span>${fmt(item.price_bottle)}</div>`;
    return `<div class="price-spirit">${lines}</div>`;
  }
  return `<div class="item-price">${fmt(item.price)}</div>`;
}

function renderItem(item, catId) {
  const n = getItemName(item);
  const meta = [];
  if (item.kcal) meta.push(`<span class="item-kcal">${item.kcal} kcal</span>`);
  if (item.note) meta.push(`<span class="item-note">${item.note}</span>`);

  return `<div class="menu-item" data-search="${(n.primary + ' ' + (n.secondary||'') + ' ' + (item.note||'')).toLowerCase()}">
    <div>
      <div class="item-name">${n.primary}${n.secondary ? `<span class="item-name-mn">${n.secondary}</span>` : ''}</div>
    </div>
    ${renderItemPrice(item, catId)}
    ${meta.length ? `<div class="item-meta">${meta.join('')}</div>` : ''}
  </div>`;
}

function parseSetNote(note) {
  if (!note) return { tags: [], text: note };
  const tags = [];
  const parts = note.split(/,\s*/);
  parts.forEach(p => {
    const trimmed = p.trim();
    if (trimmed) tags.push(trimmed);
  });
  return { tags, text: note };
}

function renderSetItem(item) {
  const parsed = parseSetNote(item.note);
  const tagsHtml = parsed.tags.length > 0
    ? `<div class="set-card-includes">${parsed.tags.map(t => `<span class="set-tag">${t}</span>`).join('')}</div>`
    : '';

  return `<div class="set-card">
    <div class="set-card-head">
      <div class="set-card-name">${item.name_en}</div>
      <div>
        <span class="set-card-price">${fmt(item.price)}</span>
      </div>
    </div>
    ${tagsHtml}
  </div>`;
}

function render() {
  buildNav();
  const menu = document.getElementById('menu');
  let totalItems = 0;
  let allPrices = [];

  const cats = MENU_DATA.categories.filter(c =>
    currentFilter === 'all' || getCatFilter(c.id) === currentFilter
  );

  menu.innerHTML = cats.map((cat, idx) => {
    totalItems += cat.items.length;
    cat.items.forEach(i => {
      if (i.price) allPrices.push(i.price);
      if (i.price_m) allPrices.push(i.price_m);
      if (i.price_50ml) allPrices.push(i.price_50ml);
    });

    const isSet = setTypes.has(cat.id);
    const itemsHtml = isSet
      ? cat.items.map(i => renderSetItem(i)).join('')
      : `<div class="items-grid">${cat.items.map(i => renderItem(i, cat.id)).join('')}</div>`;

    return `<div class="section" id="sec-${cat.id}" style="animation-delay:${idx * 0.04}s">
      <div class="section-header">
        <div class="section-title">${getCatName(cat)}</div>
        <div class="section-count">${cat.items.length} items</div>
      </div>
      ${itemsHtml}
    </div>`;
  }).join('');

  // Stats — count ALL items, not just filtered
  let allItems = 0;
  let ap = [];
  MENU_DATA.categories.forEach(cat => {
    allItems += cat.items.length;
    cat.items.forEach(i => {
      if (i.price) ap.push(i.price);
      if (i.price_m) ap.push(i.price_m);
      if (i.price_50ml) ap.push(i.price_50ml);
    });
  });
  document.getElementById('stat-items').textContent = allItems;
  document.getElementById('stat-categories').textContent = MENU_DATA.categories.length;
  const validPrices = ap.filter(p => p > 0);
  if (validPrices.length) {
    const minP = Math.min(...validPrices);
    const maxP = Math.max(...validPrices);
    document.getElementById('stat-range').textContent = `${fmt(minP)} \u2013 ${fmt(maxP)}`;
  }

  setupObserver();
}

function setupObserver() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id.replace('sec-','');
        document.querySelectorAll('.nav-btn').forEach(b =>
          b.classList.toggle('active', b.dataset.id === id)
        );
        const activeBtn = document.querySelector(`.nav-btn[data-id="${id}"]`);
        if (activeBtn) activeBtn.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
      }
    });
  }, { rootMargin: '-80px 0px -70% 0px', threshold: 0 });
  document.querySelectorAll('.section').forEach(s => obs.observe(s));
}

// Search
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  let matchCount = 0;
  document.querySelectorAll('.menu-item').forEach(el => {
    const match = !q || el.dataset.search.includes(q);
    el.classList.toggle('hidden', !match);
    if (match && q) matchCount++;
  });
  document.querySelectorAll('.set-card').forEach(el => {
    const text = el.textContent.toLowerCase();
    const match = !q || text.includes(q);
    el.classList.toggle('hidden', !match);
    if (match && q) matchCount++;
  });
  document.querySelectorAll('.section').forEach(sec => {
    const visible = sec.querySelectorAll('.menu-item:not(.hidden), .set-card:not(.hidden)');
    sec.classList.toggle('hidden', q && visible.length === 0);
  });
  const countEl = document.getElementById('searchCount');
  if (q) {
    countEl.textContent = matchCount + ' found';
    countEl.classList.add('visible');
  } else {
    countEl.classList.remove('visible');
  }
});

// Filters
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', function() {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.filter;
    // Clear search when switching filter
    document.getElementById('search').value = '';
    document.getElementById('searchCount').classList.remove('visible');
    render();
  });
});

// Back-to-top
window.addEventListener('scroll', () => {
  document.getElementById('backTop').classList.toggle('visible', window.scrollY > 400);
}, { passive: true });

// Load data
fetch('joy_menu_data.json')
  .then(r => r.json())
  .then(data => { MENU_DATA = data; render(); })
  .catch(err => {
    document.getElementById('menu').innerHTML =
      '<p style="text-align:center;color:var(--danger);padding:2rem;font-family:var(--font-mono);font-size:.85rem;">[ ERROR ] Failed to load menu data</p>';
    console.error('Menu load error:', err);
  });
</script>
</body>
</html>
