<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ — Herowater</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-layout { display: flex; min-height: 100vh; padding-top: 60px; }
    .admin-sidebar {
      width: 220px; background: var(--surface); border-right: 1px solid var(--border);
      padding: 24px 0; position: fixed; top: 60px; bottom: 0; overflow-y: auto;
    }
    .admin-sidebar a {
      display: block; padding: 10px 24px; font-size: 14px; color: var(--text-secondary); transition: all 0.2s;
    }
    .admin-sidebar a:hover, .admin-sidebar a.active { color: var(--text); background: rgba(255,255,255,0.05); }
    .admin-main { flex: 1; margin-left: 220px; padding: 32px 40px; }
    .admin-card {
      background: var(--surface); border: 1px solid var(--border); padding: 24px; margin-bottom: 16px;
    }
    .admin-card h3 { font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .admin-card .big-num { font-size: 32px; font-weight: 700; }
    .admin-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 40px; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .admin-table th { text-align: left; padding: 12px 16px; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    .admin-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .admin-table tr:hover td { background: rgba(255,255,255,0.02); }
    .admin-section { display: none; }
    .admin-section.active { display: block; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); padding: 32px;
      width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto;
    }
    .modal h2 { font-size: 18px; margin-bottom: 24px; }
    @media (max-width: 768px) {
      .admin-sidebar { display: none; }
      .admin-main { margin-left: 0; padding: 20px; }
    }
  </style>
</head>
<body>
  <nav class="nav scrolled" id="nav">
    <a href="/" class="nav-logo">HEROWATER</a>
    <div class="nav-right">
      <span style="font-size:13px;color:var(--text-muted);" id="adminName"></span>
      <button onclick="logout()" style="font-size:13px;color:var(--text-secondary);padding:8px 16px;">Гарах</button>
    </div>
  </nav>

  <div class="admin-layout">
    <div class="admin-sidebar">
      <a href="#" class="active" data-section="dashboard">Хянах самбар</a>
      <a href="#" data-section="products">Бүтээгдэхүүн</a>
      <a href="#" data-section="orders">Захиалгууд</a>
    </div>

    <div class="admin-main">
      <!-- Dashboard -->
      <div class="admin-section active" id="sec-dashboard">
        <h2 style="margin-bottom:24px;">Хянах самбар</h2>
        <div class="admin-stats" id="statsGrid"></div>
        <h3 style="font-size:14px;font-weight:600;margin-bottom:16px;">Сүүлийн захиалгууд</h3>
        <div id="recentOrders"></div>
      </div>

      <!-- Products -->
      <div class="admin-section" id="sec-products">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
          <h2>Бүтээгдэхүүн</h2>
          <button class="btn btn-primary" onclick="openProductModal()">+ Нэмэх</button>
        </div>
        <div id="productsTable"></div>
      </div>

      <!-- Orders -->
      <div class="admin-section" id="sec-orders">
        <h2 style="margin-bottom:24px;">Захиалгууд</h2>
        <div id="ordersTable"></div>
      </div>
    </div>
  </div>

  <!-- Product Modal -->
  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <h2 id="productModalTitle">Бүтээгдэхүүн нэмэх</h2>
      <form id="productForm">
        <input type="hidden" id="pf_id">
        <div class="form-group">
          <label class="form-label">Нэр *</label>
          <input type="text" id="pf_name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Ангилал</label>
          <select id="pf_category">
            <option value="still">Still</option>
            <option value="sparkling">Sparkling</option>
            <option value="alkaline">Alkaline</option>
            <option value="mineral">Mineral</option>
            <option value="flavored">Flavored</option>
            <option value="bulk">Bulk</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Үнэ (₮) *</label>
          <input type="number" id="pf_price" required>
        </div>
        <div class="form-group">
          <label class="form-label">Хэмжээ</label>
          <input type="text" id="pf_volume" placeholder="500ml">
        </div>
        <div class="form-group">
          <label class="form-label">Багцын тоо</label>
          <input type="number" id="pf_packSize" value="1" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">Нөөц</label>
          <input type="number" id="pf_stock" value="100">
        </div>
        <div class="form-group">
          <label class="form-label">Тайлбар</label>
          <textarea id="pf_description" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Зураг (URL)</label>
          <input type="text" id="pf_image" placeholder="/uploads/product.jpg">
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;">
            <input type="checkbox" id="pf_featured"> Онцлох бүтээгдэхүүн
          </label>
        </div>
        <div style="display:flex;gap:12px;margin-top:24px;">
          <button type="submit" class="btn btn-primary" style="flex:1;">Хадгалах</button>
          <button type="button" class="btn btn-ghost" style="flex:1;" onclick="closeProductModal()">Болих</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
