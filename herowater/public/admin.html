<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ — Herowater</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: var(--surface); }

    /* Admin nav */
    .admin-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 56px;
      background: #fff; border-bottom: 1px solid var(--border-light);
    }
    .admin-nav-left { display: flex; align-items: center; gap: 24px; }
    .admin-nav-logo { font-size: 16px; font-weight: 800; letter-spacing: 1px; color: var(--accent); }
    .admin-nav-label { font-size: 13px; font-weight: 500; color: var(--text-muted); padding: 4px 10px; background: var(--accent-light); border-radius: 100px; }
    .admin-nav-right { display: flex; align-items: center; gap: 12px; }
    .admin-nav-user { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
    .admin-nav-btn {
      font-size: 13px; font-weight: 500; color: var(--text-muted); padding: 6px 14px;
      border-radius: var(--radius-xs); transition: all 0.2s;
    }
    .admin-nav-btn:hover { color: var(--danger); background: var(--danger-light); }

    /* Layout */
    .admin-layout { display: flex; min-height: 100vh; padding-top: 56px; }

    /* Sidebar */
    .admin-sidebar {
      width: 240px; background: #fff; border-right: 1px solid var(--border-light);
      padding: 16px 12px; position: fixed; top: 56px; bottom: 0; overflow-y: auto;
    }
    .admin-sidebar-group { margin-bottom: 24px; }
    .admin-sidebar-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--text-muted); padding: 8px 12px;
    }
    .admin-sidebar a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; font-size: 14px; font-weight: 500;
      color: var(--text-secondary); border-radius: var(--radius-xs); transition: all 0.15s;
      margin-bottom: 2px;
    }
    .admin-sidebar a:hover { color: var(--text); background: var(--surface); }
    .admin-sidebar a.active { color: var(--accent); background: var(--accent-light); font-weight: 600; }
    .admin-sidebar a svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Main */
    .admin-main { flex: 1; margin-left: 240px; padding: 28px 32px; }

    /* Page header */
    .admin-page-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 28px;
    }
    .admin-page-title { font-size: 22px; font-weight: 700; color: var(--text); }
    .admin-page-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

    /* Stats cards */
    .admin-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: #fff; border: 1px solid var(--border-light); border-radius: var(--radius);
      padding: 20px 24px; transition: box-shadow 0.2s;
    }
    .stat-card:hover { box-shadow: var(--shadow-sm); }
    .stat-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .stat-card-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card-icon {
      width: 36px; height: 36px; border-radius: var(--radius-xs);
      display: flex; align-items: center; justify-content: center;
    }
    .stat-card-icon svg { width: 18px; height: 18px; }
    .stat-card-icon.blue { background: var(--accent-light); color: var(--accent); }
    .stat-card-icon.green { background: var(--success-light); color: var(--success); }
    .stat-card-icon.orange { background: var(--warning-light); color: var(--warning); }
    .stat-card-icon.purple { background: #f3e8ff; color: #7c3aed; }
    .stat-card .big-num { font-size: 28px; font-weight: 800; color: var(--text); }

    /* Content card */
    .content-card {
      background: #fff; border: 1px solid var(--border-light); border-radius: var(--radius);
      margin-bottom: 20px; overflow: hidden;
    }
    .content-card-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border-bottom: 1px solid var(--border-light);
    }
    .content-card-title { font-size: 15px; font-weight: 600; color: var(--text); }

    /* Table */
    .admin-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .admin-table th {
      text-align: left; padding: 12px 20px; font-size: 11px; font-weight: 600;
      letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-muted);
      background: var(--surface); border-bottom: 1px solid var(--border-light);
    }
    .admin-table td { padding: 14px 20px; border-bottom: 1px solid var(--border-light); color: var(--text); }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: #fafbfc; }

    .table-action {
      font-size: 13px; font-weight: 500; padding: 5px 12px; border-radius: var(--radius-xs);
      transition: all 0.15s; display: inline-block;
    }
    .table-action.edit { color: var(--accent); }
    .table-action.edit:hover { background: var(--accent-light); }
    .table-action.delete { color: var(--danger); }
    .table-action.delete:hover { background: var(--danger-light); }

    /* Sections */
    .admin-section { display: none; }
    .admin-section.active { display: block; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
      z-index: 200; display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: var(--radius); padding: 0;
      width: 90%; max-width: 520px; max-height: 85vh; overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 24px; border-bottom: 1px solid var(--border-light);
    }
    .modal-header h2 { font-size: 17px; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px; border-radius: var(--radius-xs);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: all 0.15s; font-size: 18px;
    }
    .modal-close:hover { background: var(--surface); color: var(--text); }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border-light); display: flex; gap: 12px; justify-content: flex-end; }

    /* Order status select in table */
    .status-select {
      padding: 6px 10px; font-size: 12px; border-radius: var(--radius-xs);
      background: var(--surface); border: 1px solid var(--border); width: auto;
    }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }

    @media (max-width: 1024px) {
      .admin-stats { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .admin-sidebar { display: none; }
      .admin-main { margin-left: 0; padding: 20px 16px; }
      .admin-stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Admin nav -->
  <div class="admin-nav">
    <div class="admin-nav-left">
      <a href="/" class="admin-nav-logo">HEROWATER</a>
      <span class="admin-nav-label">Admin</span>
    </div>
    <div class="admin-nav-right">
      <span class="admin-nav-user" id="adminName"></span>
      <a href="/" class="admin-nav-btn">Сайт руу</a>
      <button onclick="logout()" class="admin-nav-btn">Гарах</button>
    </div>
  </div>

  <div class="admin-layout">
    <!-- Sidebar -->
    <div class="admin-sidebar">
      <div class="admin-sidebar-group">
        <div class="admin-sidebar-label">Удирдлага</div>
        <a href="#" class="active" data-section="dashboard">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
          Хянах самбар
        </a>
        <a href="#" data-section="products">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
          Бүтээгдэхүүн
        </a>
        <a href="#" data-section="orders">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          Захиалгууд
        </a>
      </div>
    </div>

    <!-- Main content -->
    <div class="admin-main">
      <!-- Dashboard -->
      <div class="admin-section active" id="sec-dashboard">
        <div class="admin-page-header">
          <div>
            <h1 class="admin-page-title">Хянах самбар</h1>
            <p class="admin-page-subtitle">Ерөнхий мэдээлэл</p>
          </div>
        </div>
        <div class="admin-stats" id="statsGrid"></div>
        <div class="content-card">
          <div class="content-card-header">
            <span class="content-card-title">Сүүлийн захиалгууд</span>
          </div>
          <div id="recentOrders"></div>
        </div>
      </div>

      <!-- Products -->
      <div class="admin-section" id="sec-products">
        <div class="admin-page-header">
          <div>
            <h1 class="admin-page-title">Бүтээгдэхүүн</h1>
            <p class="admin-page-subtitle">Бүтээгдэхүүний жагсаалт</p>
          </div>
          <button class="btn btn-primary" onclick="openProductModal()" style="min-width:auto;padding:10px 20px;">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Нэмэх
          </button>
        </div>
        <div class="content-card">
          <div id="productsTable"></div>
        </div>
      </div>

      <!-- Orders -->
      <div class="admin-section" id="sec-orders">
        <div class="admin-page-header">
          <div>
            <h1 class="admin-page-title">Захиалгууд</h1>
            <p class="admin-page-subtitle">Бүх захиалгын жагсаалт</p>
          </div>
        </div>
        <div class="content-card">
          <div id="ordersTable"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Product Modal -->
  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="productModalTitle">Бүтээгдэхүүн нэмэх</h2>
        <button class="modal-close" onclick="closeProductModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="productForm">
          <input type="hidden" id="pf_id">
          <div class="form-group">
            <label class="form-label">Нэр *</label>
            <input type="text" id="pf_name" required placeholder="Бүтээгдэхүүний нэр">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="form-group">
              <label class="form-label">Ангилал</label>
              <select id="pf_category">
                <option value="still">Still</option>
                <option value="sparkling">Sparkling</option>
                <option value="alkaline">Alkaline</option>
                <option value="mineral">Mineral</option>
                <option value="flavored">Flavored</option>
                <option value="bulk">Bulk</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Үнэ (₮) *</label>
              <input type="number" id="pf_price" required placeholder="0">
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
            <div class="form-group">
              <label class="form-label">Хэмжээ</label>
              <input type="text" id="pf_volume" placeholder="500ml">
            </div>
            <div class="form-group">
              <label class="form-label">Багц</label>
              <input type="number" id="pf_packSize" value="1" min="1">
            </div>
            <div class="form-group">
              <label class="form-label">Нөөц</label>
              <input type="number" id="pf_stock" value="100">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Тайлбар</label>
            <textarea id="pf_description" rows="3" placeholder="Бүтээгдэхүүний тайлбар"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Зурагны URL</label>
            <input type="text" id="pf_image" placeholder="/uploads/product.jpg">
          </div>
          <div class="form-group">
            <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;color:var(--text-secondary);">
              <input type="checkbox" id="pf_featured" style="width:auto;"> Онцлох бүтээгдэхүүн
            </label>
          </div>
          <div class="modal-footer" style="padding:0;border:none;margin-top:8px;">
            <button type="button" class="btn btn-ghost" style="min-width:auto;padding:10px 20px;" onclick="closeProductModal()">Болих</button>
            <button type="submit" class="btn btn-primary" style="min-width:auto;padding:10px 24px;">Хадгалах</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
