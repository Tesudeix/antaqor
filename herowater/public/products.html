<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бүтээгдэхүүн — Herowater</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav scrolled" id="nav">
    <a href="/" class="nav-logo">HEROWATER</a>
    <div class="nav-links">
      <a href="/products.html">Бүтээгдэхүүн</a>
      <a href="/about.html">Тухай</a>
      <a href="/contact.html">Холбоо барих</a>
    </div>
    <div class="nav-right">
      <a href="/cart.html" class="nav-cart">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
        <span class="cart-badge" id="cartBadge"></span>
      </a>
    </div>
  </nav>

  <div style="height: 80px;"></div>

  <section class="section">
    <p class="section-label">Каталог</p>
    <h1 class="section-title">Бүтээгдэхүүн</h1>

    <div class="category-tabs" id="categoryTabs">
      <button class="category-tab active" data-cat="all">Бүгд</button>
      <button class="category-tab" data-cat="still">Still</button>
      <button class="category-tab" data-cat="sparkling">Sparkling</button>
      <button class="category-tab" data-cat="alkaline">Alkaline</button>
      <button class="category-tab" data-cat="mineral">Mineral</button>
      <button class="category-tab" data-cat="bulk">Bulk</button>
    </div>

    <div class="products-grid" id="productsGrid"></div>
  </section>

  <footer class="footer">
    <div class="footer-bottom">© 2026 Herowater. Бүх эрх хуулиар хамгаалагдсан.</div>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/products.js"></script>
</body>
</html>
