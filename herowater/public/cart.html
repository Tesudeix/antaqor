<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сагс — Herowater</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav" id="nav">
    <a href="/" class="nav-logo">HEROWATER</a>
    <div class="nav-links">
      <a href="/products.html">Бүтээгдэхүүн</a>
      <a href="/about.html">Тухай</a>
      <a href="/contact.html">Холбоо барих</a>
    </div>
    <div class="nav-right">
      <a href="/cart.html" class="nav-cart">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
        <span class="cart-badge" id="cartBadge"></span>
      </a>
    </div>
  </nav>

  <div style="height:64px;"></div>

  <section class="section">
    <p class="section-label">Худалдан авалт</p>
    <h1 class="section-title">Сагс</h1>

    <div id="cartEmpty" style="display:none;text-align:center;padding:80px 0;">
      <svg width="48" height="48" fill="none" stroke="var(--text-muted)" viewBox="0 0 24 24" style="margin-bottom:16px;opacity:0.4;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
      <p style="color:var(--text-muted);margin-bottom:24px;">Сагс хоосон байна</p>
      <a href="/products.html" class="btn btn-primary">Бүтээгдэхүүн үзэх</a>
    </div>

    <div id="cartContent" style="display:none;">
      <div id="cartItems"></div>
      <div class="cart-summary">
        <div class="cart-summary-row">
          <span>Дүн</span>
          <span id="cartSubtotal"></span>
        </div>
        <div class="cart-summary-row">
          <span>Хүргэлт</span>
          <span id="cartDelivery"></span>
        </div>
        <div class="cart-summary-row cart-summary-total">
          <span>Нийт</span>
          <span id="cartTotal"></span>
        </div>
        <a href="/checkout.html" class="btn btn-primary" style="width:100%;margin-top:24px;">Захиалга өгөх</a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-bottom">&copy; 2026 Herowater. Бүх эрх хуулиар хамгаалагдсан.</div>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/cart.js"></script>
</body>
</html>
